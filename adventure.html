<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <title>Korean Quest — Adventure</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/master.css" />
    <link rel="stylesheet" href="css/contrast-overrides.css" />

    <link rel="stylesheet" href="css/responsive.css" />

    <link rel="stylesheet" href="css/pages/adventure.css" />
    <link rel="stylesheet" href="css/components/theme-toggle.css" />
    <link rel="stylesheet" href="css/chatbot.css" /> 

    <script type="module" src="js/main/auth.js"></script>
    <script defer src="js/main/state.js"></script>
    <script defer type="module" src="js/main/adventure.js"></script>
    <script type="module" src="js/main/theme.js"></script>
    <script type="module" src="./js/main/chatbot.js?v=5"></script>
    <script defer src="js/main/mobile-nav.js"></script>


  </head>
  <body>
    <header class="container site-header">
        <nav class="nav site-nav" aria-label="Primary">
          <a class="brand" href="index.html" aria-label="Korean Quest Home">
            <img class="brand-logo" src="favicon/logoImage.png" alt="Korean Quest logo" />
            <span class="brand-wordmark">
              <span class="brand-korean">Korean</span>
              <span class="brand-quest">Quest</span>
            </span>
          </a>

          <div class="nav-mobile-top">
            <a class="pill nav-home-link" href="index.html">Home</a>

            <button
              class="nav-toggle"
              id="navToggle"
              type="button"
              aria-expanded="false"
              aria-controls="mobileNavMenu"
              aria-label="Open menu"
            >
              ☰
            </button>
          </div>

          <div class="nav-links" id="mobileNavMenu">
            <a class="pill" href="schedule.html">Schedule</a>
            <a class="pill" href="resources.html">Resources</a>
            <a class="pill" href="adventure.html" aria-current="page">Adventure</a>
            <a class="pill" href="dashboard.html">Dashboard</a>
            <a class="pill" href="leaderboard.html">Leaderboard</a>
            <a class="pill" href="about.html">About</a>
          </div>
        </nav>
    </header>


    <main class="container grid">
      <!-- Overworld Map -->
      <section class="card" id="mapCard">
        <header class="flex" style="justify-content:space-between;">
          <h2>Adventure Map</h2>
          <div class="flex" style="gap:6px;">
            <select id="topicSelect" class="pill" title="Question Topic">
              <option value="hangul">Hangul (letters & sounds)</option>
              <option value="vocab" selected>Vocabulary</option>
              <option value="mixed">Mixed</option>
            </select>
            <select id="difficultySelect" class="pill" title="Difficulty">
              <option value="easy" selected>Easy</option>
              <option value="normal">Normal</option>
              <option value="hard">Hard</option>
            </select>
          </div>
        </header>

        <p class="muted">Pick a node to start a battle. Correct answers power up your attacks — miss and the monster strikes back!</p>
        <section class="adventure-levels-wrapper">
          <div class="map" id="mapGrid">
            <!-- JS populates nodes -->
          </div>
        </section>  
      </section>

      <!-- Battle Panel -->
      <section class="card" id="battleCard" hidden>
        <header class="flex" style="justify-content:space-between;">
          <h2 id="encounterTitle">Encounter</h2>
          <button id="exitBattleBtn" class="btn secondary" type="button">Run</button>
        </header>

        <div class="battle" style="display:grid; gap:12px; grid-template-columns:1fr 1fr;">
          <div class="side player">
            <div class="sprite" id="playerSprite" style="font-size:48px">🧑‍🎓</div>
            <div class="hp-row" style="display:grid; grid-template-columns:auto 1fr auto; gap:8px; align-items:center;">
              <span>YOU</span>
              <div class="bar"><i id="playerHPBar" style="width:100%"></i></div>
              <span id="playerHPText">20/20</span>
            </div>
          </div>

          <div class="side enemy" style="text-align:right">
            <div class="sprite" id="enemySprite" style="font-size:48px">👾</div>
            <div class="hp-row" style="display:grid; grid-template-columns:auto 1fr auto; gap:8px; align-items:center;">
              <span id="enemyName">Slime</span>
              <div class="bar"><i id="enemyHPBar" style="width:100%"></i></div>
              <span id="enemyHPText">20/20</span>
            </div>
          </div>
        </div>

        <!-- Question UI -->
        <div class="card" style="margin-top:8px;">
          <div class="flex" style="justify-content:space-between; align-items:center;">
            <h3 id="qTitle" style="margin:0">Question</h3>
            <div class="muted" id="turnHint">Answer to attack!</div>
          </div>
          <p id="qPrompt" style="font-size:1.05rem; margin:8px 0">—</p>
          <div id="qChoices" class="grid" style="grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap:8px;">
            <!-- buttons injected -->
          </div>
          <div class="muted" id="qFeedback" style="margin-top:6px"></div>
          <div id="speedBar" class="progress" style="margin-top:8px;"><i id="speedFill" style="width:100%"></i></div>
        </div>
      </section>
    </main>

   
    <div id="authModal" class="modal" hidden>
      <div class="modal-card">
        <h3>Sign in</h3>
        <form id="authForm">
          <label>Email</label>
          <input id="authEmail" type="email" required />
          <label>Password</label>
          <input id="authPass" type="password" required minlength="6" />
          <div class="row">
            <button id="emailSignIn" class="btn primary" type="submit">Sign in</button>
            <button id="emailSignUp" class="btn secondary" type="button">Create account</button>
          </div>
        </form>
        <div class="row">
          <button id="googleBtn" class="btn" type="button">Continue with Google</button>
          <button id="authClose" class="btn" type="button">Close</button>
        </div>
        <p id="authMsg" class="muted" aria-live="polite"></p>
      </div>
    </div>
  </body>
</html>
