<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Korean Quest — Jamo Level Select</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Your shared CSS (keep these) -->
  <script type="module" src="../js/main/auth.js"></script>
  <link rel="stylesheet" href="../css/master.css" />
  <link rel="stylesheet" href="../css/pages/alphabetWorld.css" />


  <!-- Hard guarantee the grid shows as columns even if page CSS misses -->
  <style>
    /* FORCE a GRID here so it never falls back to stacked rows */
    #jamoGrid {
      display: grid !important;
      gap: 12px;
      grid-template-columns: repeat(5, minmax(160px, 1fr));
    }
    @media (max-width: 1200px) {
      #jamoGrid { grid-template-columns: repeat(3, minmax(160px, 1fr)); }
    }
    @media (max-width: 820px) {
      #jamoGrid { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
    }
    @media (max-width: 520px) {
      #jamoGrid { grid-template-columns: 1fr; }
    }
    /* Small card polish to fit 5-wide */
    .aw-level-card canvas { width: 120px; height: 120px; margin-inline: auto; display:block; }
    .aw-level-card header h3 { margin: 0; }
  </style>
</head>
<body>
  <header class="container">
    <nav class="nav" aria-label="Primary">
      <div class="logo">🇰🇷 Korean Quest</div>
      <a class="pill" href="index.html">Home</a>
      <a class="pill" href="resources.html">Resources</a>
      <a class="pill" href="jamo-select.html" aria-current="page">Jamo Select</a>
      <a class="pill" href="tracing.html">Tracing</a>
      <span class="spacer"></span>
      <span id="userBadge" class="muted"></span>
      <button id="loginBtn"  class="pill" type="button">Sign in</button>
      <button id="logoutBtn" class="pill" type="button" hidden>Sign out</button>
    </nav>
    
  </header>

  <main class="container grid">
    <section class="card">
      <h1>🔠 Choose a Jamo</h1>
      <p class="muted">Tap a character to practice. The preview animates the <strong>traditional stroke order</strong>. Earn ⭐ for accuracy.</p>

      <!-- REAL GRID (5 cols desktop → 3/2/1 responsive) -->
      <div class="aw-grid" id="jamoGrid" role="list">
        <!-- JS populates the cards -->
      </div>

      <p class="muted" style="margin-top:8px">Stars: ≥90 → ⭐⭐⭐ • ≥75 → ⭐⭐ • ≥60 → ⭐</p>
    </section>
  </main>

  <footer class="container footer">
    <small>© Korean Quest — FBLA “Design to Learn”</small>
  </footer>

  <!-- Modules (keep type="module") -->
  <script type="module" src="../js/main/state.js"></script>
  <script type="module" src="../js/levels/jamo-select.js"></script>
    <div id="authModal" class="modal" hidden>
      <div class="modal-card">
        <h3>Sign in</h3>
        <form id="authForm">
          <label>Email</label>
          <input id="authEmail" type="email" required />
          <label>Password</label>
          <input id="authPass" type="password" required minlength="6" />
          <div class="row">
            <button id="emailSignIn" class="btn primary" type="submit">Sign in</button>
            <button id="emailSignUp" class="btn secondary" type="button">Create account</button>
          </div>
        </form>
        <div class="row">
          <button id="googleBtn" class="btn" type="button">Continue with Google</button>
          <button id="authClose" class="btn" type="button">Close</button>
        </div>
        <p id="authMsg" class="muted" aria-live="polite"></p>
      </div>
    </div>
</body>
</html>
