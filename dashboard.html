<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <title>Korean Quest — Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/master.css" />
    <link rel="stylesheet" href="css/contrast-overrides.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/pages/dashboard.css" />
    <link rel="stylesheet" href="css/components/theme-toggle.css" />
    <link rel="stylesheet" href="css/chatbot.css" />

    <script defer src="js/main/state.js"></script>
    <script type="module" src="js/main/auth.js"></script>
    <script type="module" src="js/main/theme.js"></script>
    <script type="module" src="js/main/dashboard.js"></script>
    <script defer src="js/main/nav-rebuild.js"></script>
    <script type="module" src="./js/main/chatbot.js?v=5"></script>
  </head>

  <body>
    <header class="container site-header">
      <nav class="nav site-nav" aria-label="Primary">
        <a class="brand" href="index.html" aria-label="Korean Quest Home">
          <img class="brand-logo" src="favicon/logoImage.png" alt="Korean Quest logo" />
          <span class="brand-wordmark">
            <span class="brand-korean">Korean</span>
            <span class="brand-quest">Quest</span>
          </span>
        </a>
      </nav>
    </header>

    <main class="container dashboard-page">
      <!-- STUDENT DASHBOARD -->
      <section class="card dashboard-card student-dashboard-card">
        <div class="student-dashboard-header">
          <span class="student-dashboard-icon" aria-hidden="true">🎯</span>
          <h1>Student Dashboard</h1>
        </div>

        <div class="student-dashboard-body">
          <div class="student-dashboard-left">
            <div class="dashboard-stats">
              <div class="stat-box">
                <span class="stat-label">Level</span>
                <strong id="levelValue" class="stat-value">1</strong>
              </div>

              <div class="stat-box">
                <span class="stat-label">XP</span>
                <strong id="xpValue" class="stat-value">0 / 100</strong>
              </div>

              <div class="stat-box">
                <span class="stat-label">Streak</span>
                <strong id="streakValue" class="stat-value">2 days</strong>
              </div>

              <div class="stat-box">
                <span class="stat-label">Coins</span>
                <strong id="coinsValue" class="stat-value">0</strong>
              </div>

              <div class="stat-box">
                <span class="stat-label">Badges</span>
                <strong id="dBadges" class="stat-value">—</strong>
              </div>
            </div>
          </div>

          <div class="student-dashboard-right">
            <img
              class="dashboard-archery-art"
              src="favicon/dashboard/archery.png"
              alt="Korean Quest archery illustration"
            />
          </div>
        </div>

        <!-- <div class="dashboard-progress" aria-label="XP Progress">
          <span id="xpProgressFill" style="width: 0%"></span>
        </div> -->
      </section>
      <div class="xp-progress" aria-label="XP progress">
        <div class="xp-progress__track">
          <div id="dBar" class="xp-progress__fill"></div>
        </div>
      </div>
      <!-- LOWER 2-COLUMN SECTION -->
      <section class="dashboard-columns">
        <!-- RECENT WORK LEFT -->
        <section class="card recent-card">
          <div class="section-head">
            <span class="section-icon" aria-hidden="true">📝</span>
            <h2>Recent Work</h2>
          </div>

          <ul id="recentWorkList" class="recent-list">
            <li>No work recorded yet.</li>
          </ul>
        </section>

        <!-- DAILY QUESTS RIGHT -->
        <section class="card quests-card">
          <div class="section-head">
            <span class="section-icon" aria-hidden="true">🔥</span>
            <h2>Daily Quests</h2>
          </div>

          <ul id="dailyQuestList" class="quest-list">
            <li>Earn 30 XP today — 0/30</li>
            <li>Complete 1 lesson — 0/1</li>
            <li>Win 1 battle — 0/1</li>
          </ul>
        </section>
      </section>
    </main>
  </body>
</html>
