<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <title>Korean Quest — Tracing</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="css/master.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/pages/tracing.css" />
    <link rel="stylesheet" href="css/components/theme-toggle.css" /> 
    <link rel="stylesheet" href="css/chatbot.css" /> 
    <script type="module" src="./js/main/chatbot.js?v=5"></script>
    <script defer src="js/main/mobile-nav.js"></script>
    <script type="module" src="js/main/auth.js"></script>
    <script defer src="js/main/state.js"></script>
    <script type="module" defer src="js/levels/tracing-level.js"></script>
    <script type="module" src="js/main/theme.js"></script>


  </head>
  <body>
    <header class="container site-header">
        <nav class="nav site-nav" aria-label="Primary">
          <a class="brand" href="index.html" aria-label="Korean Quest Home">
            <img class="brand-logo" src="favicon/logoImage.png" alt="Korean Quest logo" />
            <span class="brand-wordmark">
              <span class="brand-korean">Korean</span>
              <span class="brand-quest">Quest</span>
            </span>
          </a>

          <div class="nav-mobile-top">
            <a class="pill nav-home-link" href="index.html">Home</a>

            <button
              class="nav-toggle"
              id="navToggle"
              type="button"
              aria-expanded="false"
              aria-controls="mobileNavMenu"
              aria-label="Open menu"
            >
              ☰
            </button>
          </div>

          <div class="nav-links" id="mobileNavMenu">
            <a class="pill" href="schedule.html">Schedule</a>
            <a class="pill" href="resources.html" aria-current="page">Resources</a>
            <a class="pill" href="adventure.html">Adventure</a>
            <a class="pill" href="dashboard.html">Dashboard</a>
            <a class="pill" href="leaderboard.html">Leaderboard</a>
            <a class="pill" href="about.html">About</a>
          </div>
        </nav>
  </header>


    <main class="container grid">
      <section class="card">
        <h1>✍️ Tracing Practice</h1>
        <a href="jamo-select.html" class="btn secondary back-btn">← Back to Jamo Select</a>
        <!-- <p class="muted">
          Follow correct stroke order. Score ≥80 to earn a badge.
        </p> -->

        <div class="trace-wrap">
          <canvas
            id="traceCanvas"
            width="320"
            height="320"
            class="trace-canvas"
            aria-label="Tracing canvas"
          ></canvas>
          <div class="trace-controls">
            <div class="muted">
              Character: <strong id="traceChar">ㄱ</strong>
            </div>
            <button class="btn" id="btnClear" type="button">Clear</button>
            <!-- <button class="btn" id="btnGrade" type="button">Grade</button> -->
            <!-- <details class="trace-legend">
              <summary>Stroke Order</summary>
              <ol id="strokeLegend"></ol>
            </details> -->
            <div id="traceScore" class="muted"></div>
          </div>
        </div>
      </section>
    </main>

   
    <div id="authModal" class="modal" hidden>
      <div class="modal-card">
        <h3>Sign in</h3>
        <form id="authForm">
          <label>Email</label>
          <input id="authEmail" type="email" required />
          <label>Password</label>
          <input id="authPass" type="password" required minlength="6" />
          <div class="row">
            <button id="emailSignIn" class="btn primary" type="submit">Sign in</button>
            <button id="emailSignUp" class="btn secondary" type="button">Create account</button>
          </div>
        </form>
        <div class="row">
          <button id="googleBtn" class="btn" type="button">Continue with Google</button>
          <button id="authClose" class="btn" type="button">Close</button>
        </div>
        <p id="authMsg" class="muted" aria-live="polite"></p>
      </div>
    </div>
  </body>
</html>
