<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <title>Korean Quest — Appointments</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Your shared theme -->
  <link rel="stylesheet" href="css/master.css" />
  <link rel="stylesheet" href="css/contrast-overrides.css" />
  <link rel="stylesheet" href="css/responsive.css" />

  <!-- Page styles -->
  <link rel="stylesheet" href="css/pages/schedule.css" />
  <link rel="stylesheet" href="css/components/theme-toggle.css" />
  <link rel="stylesheet" href="css/chatbot.css" />

  <script type="module" src="js/main/theme.js"></script>
  <script type="module" src="js/main/state.js"></script>
  <script type="module" src="js/main/schedule.js"></script>
  <script type="module" src="./js/main/chatbot.js?v=5"></script>

</head>
<body>
  <header class="container">
    <nav class="nav" aria-label="Primary">
      <a class="brand" href="index.html" aria-label="Korean Quest Home">
        <img class="brand-logo" src="favicon/logoImage.png" alt="Korean Quest logo" />
        <span class="brand-wordmark">
          <span class="brand-korean">Korean</span>
          <span class="brand-quest">Quest</span>
        </span>
      </a>
      <a class="pill" href="index.html" >Home</a>
      <a class="pill" href="schedule.html" aria-current="page">Schedule</a>
      <a class="pill" href="resources.html">Resources</a>
      <a class="pill" href="adventure.html">Adventure</a>
      <a class="pill" href="dashboard.html">Dashboard</a>
      <!-- <a class="pill" href="shop.html">Shop</a> -->
      <a class="pill" href="leaderboard.html">Leaderboard</a>
      <a class="pill" href="about.html">About</a>
      <!-- <a class="pill" href="test.html">test</a> -->

      <!-- <span class="spacer"></span>
      <span id="userBadge" class="muted"></span>
      <button id="loginBtn"  class="pill" type="button">Sign in</button>
      <button id="logoutBtn" class="pill" type="button" hidden>Sign out</button> -->
    </nav>
  </header>

  <main class="container grid">
    <section class="card">
      <h1>📅 Book a Tutoring Slot</h1>
      <p class="muted">Pick a date, then choose a time. Booked slots are greyed out.</p>

      <div class="appt-layout">
        <!-- Calendar -->
        <div class="cal card">
          <div class="cal-header">
            <button class="btn secondary" id="prevMonth" type="button" aria-label="Previous month">‹</button>
            <h2 id="monthLabel" class="cal-title" aria-live="polite"></h2>
            <button class="btn secondary" id="nextMonth" type="button" aria-label="Next month">›</button>
          </div>

          <div class="cal-grid" id="calGrid" role="grid" aria-label="Calendar">
            <!-- JS renders weekday header + days -->
          </div>
        </div>

        <!-- Time slots -->
        <div class="slots card">
          <h2 class="slots-title">Times on <span id="selectedDateLabel">—</span></h2>
          <div class="slots-grid" id="slotsGrid" role="list">
            <!-- JS renders slot buttons -->
          </div>
          <div class="flex">
            <button class="btn secondary" id="clearDay" type="button">Clear my booking for this day</button>
          </div>
          <p class="muted" id="slotHint" style="margin-top:8px">
            Tip: click an available time to book it. You can only hold one slot per day.
          </p>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>📝 Your Bookings</h2>
      <ul id="myBookings" class="my-list">
        <!-- JS renders your upcoming bookings -->
      </ul>
    </section>
  </main>


  <!-- JS modules -->
  <script>console.log('[appointments] schedule.html parsed');</script>

  <script type="module" src="js/main/auth.js"></script>
  <script type="module" src="js/main/schedule.js"></script>
  <script type="module" src="js/main/theme.js"></script>


    <div id="authModal" class="modal" hidden>
      <div class="modal-card">
        <h3>Sign in</h3>
        <form id="authForm">
          <label>Email</label>
          <input id="authEmail" type="email" required />
          <label>Password</label>
          <input id="authPass" type="password" required minlength="6" />
          <div class="row">
            <button id="emailSignIn" class="btn primary" type="submit">Sign in</button>
            <button id="emailSignUp" class="btn secondary" type="button">Create account</button>
          </div>
        </form>
        <div class="row">
          <button id="googleBtn" class="btn" type="button">Continue with Google</button>
          <button id="authClose" class="btn" type="button">Close</button>
        </div>
        <p id="authMsg" class="muted" aria-live="polite"></p>
      </div>
    </div>
</body>
</html>
