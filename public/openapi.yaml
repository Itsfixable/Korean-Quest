openapi: 3.1.0
info:
  title: Korean Quest API
  version: 1.0.0
  description: >
    Korean Quest is a Next.js single-page app that has **no internal API route
    handlers** of its own. Instead it talks directly to three groups of HTTP
    services from the browser:


    1. **Korean Quest Workers** — custom Cloudflare Workers that power the AI
       chatbot, video-call summaries, and live transcription.

    2. **Supabase Database (PostgREST)** — the `profiles` table that stores each
       player's game state and feeds the public leaderboard.

    3. **Supabase Auth (GoTrue)** — email/password and Google OAuth sign-in,
       invoked through the `@supabase/supabase-js` client.


    The Supabase endpoints are auto-generated by Supabase; the request/response
    shapes documented here reflect how this app actually calls them. The Worker
    endpoints are bespoke and are the primary "API" of this project.
  contact:
    name: Korean Quest
  license:
    name: Proprietary

servers:
  - url: https://crimson-truth-507c.mr-koji-tanaka.workers.dev
    description: Chatbot Worker
  - url: https://kq-call-summary.mr-koji-tanaka.workers.dev
    description: Call Summary Worker
  - url: https://kq-live-transcribe-hf.mr-koji-tanaka.workers.dev
    description: Live Transcription Worker
  - url: "{supabaseUrl}"
    description: Supabase project (PostgREST + Auth)
    variables:
      supabaseUrl:
        default: https://YOUR-PROJECT.supabase.co
        description: Value of NEXT_PUBLIC_SUPABASE_URL

tags:
  - name: Chatbot
    description: AI assistant for Korean language, culture, and grammar questions.
  - name: Video
    description: AI summary and live transcription for practice video calls.
  - name: Profiles
    description: Player game-state persistence and leaderboard (Supabase PostgREST).
  - name: Auth
    description: Sign-up, sign-in, OAuth, and sign-out (Supabase GoTrue).

paths:
  # ---------------------------------------------------------------------------
  # Chatbot Worker
  # ---------------------------------------------------------------------------
  /:
    post:
      tags: [Chatbot]
      summary: Send a chat message
      description: >
        Sends the recent conversation history to the LLM-backed chatbot Worker
        and returns the assistant's reply. The client keeps the last 14 messages
        of history. Used by the floating chat widget.
      operationId: postChat
      servers:
        - url: https://crimson-truth-507c.mr-koji-tanaka.workers.dev
          description: Chatbot Worker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
            example:
              model: "Qwen/Qwen2.5-7B-Instruct:fastest"
              messages:
                - role: user
                  content: "How do I say 'thank you' in Korean?"
      responses:
        "200":
          description: Assistant reply.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
              example:
                reply: "You can say 감사합니다 (gamsahamnida) for a polite 'thank you'."
        "500":
          description: Upstream model error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---------------------------------------------------------------------------
  # Call Summary Worker
  # ---------------------------------------------------------------------------
  /api/summary:
    post:
      tags: [Video]
      summary: Generate an AI session summary
      description: >
        Takes the transcript of a practice video call and returns a structured
        AI coaching summary (topics, vocabulary, strengths, weaknesses,
        recommendations, daily quests, and an XP award).
      operationId: postSummary
      servers:
        - url: https://kq-call-summary.mr-koji-tanaka.workers.dev
          description: Call Summary Worker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SummaryRequest"
            example:
              transcript: "You: 안녕하세요. Partner: 안녕하세요, 만나서 반가워요."
      responses:
        "200":
          description: Structured session summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryResponse"
        "400":
          description: Missing or empty transcript.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Summary generation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---------------------------------------------------------------------------
  # Live Transcription Worker
  # ---------------------------------------------------------------------------
  /api/transcribe:
    post:
      tags: [Video]
      summary: Transcribe an audio chunk
      description: >
        Accepts a short WAV audio chunk (16 kHz mono PCM, ~4s) captured from the
        microphone and returns the recognized text. Called repeatedly while live
        captions are running.
      operationId: postTranscribe
      servers:
        - url: https://kq-live-transcribe-hf.mr-koji-tanaka.workers.dev
          description: Live Transcription Worker
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/TranscribeRequest"
      responses:
        "200":
          description: Transcription result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscribeResponse"
              example:
                text: "안녕하세요"
        "400":
          description: Missing or invalid audio.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Transcription failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---------------------------------------------------------------------------
  # Supabase PostgREST — profiles table
  # ---------------------------------------------------------------------------
  /rest/v1/profiles:
    get:
      tags: [Profiles]
      summary: Read profile(s)
      description: >
        PostgREST query against the `profiles` table.


        - **Single profile** (signed-in user's game state): filter with
          `id=eq.<uuid>` and `select=id,email,display_name,avatar_image,player,progress,updated_at`.

        - **Leaderboard**: select `id,display_name,avatar_image,player` with a
          high `limit`; the client sorts by XP and trims to the top N.
      operationId: getProfiles
      servers:
        - url: "{supabaseUrl}"
          variables:
            supabaseUrl:
              default: https://YOUR-PROJECT.supabase.co
      security:
        - SupabaseApiKey: []
          SupabaseBearer: []
      parameters:
        - name: select
          in: query
          required: false
          schema:
            type: string
          example: id,email,display_name,avatar_image,player,progress,updated_at
        - name: id
          in: query
          required: false
          description: PostgREST filter, e.g. `eq.<uuid>`.
          schema:
            type: string
          example: eq.0b3f6f2e-1c2d-4a5b-8e9f-1234567890ab
        - name: limit
          in: query
          required: false
          schema:
            type: integer
          example: 500
      responses:
        "200":
          description: Array of profile rows.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProfileRow"
    post:
      tags: [Profiles]
      summary: Upsert a profile
      description: >
        Inserts or updates the signed-in player's row. The client sends the
        header `Prefer: resolution=merge-duplicates` so the call upserts on the
        `id` primary key. Used to persist game state (debounced) and to seed a
        new account.
      operationId: upsertProfile
      servers:
        - url: "{supabaseUrl}"
          variables:
            supabaseUrl:
              default: https://YOUR-PROJECT.supabase.co
      security:
        - SupabaseApiKey: []
          SupabaseBearer: []
      parameters:
        - name: Prefer
          in: header
          required: false
          schema:
            type: string
            default: resolution=merge-duplicates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpsert"
            example:
              id: 0b3f6f2e-1c2d-4a5b-8e9f-1234567890ab
              display_name: Koji
              avatar_image: /favicon/shop/avatars/rawAvatar1.png
              player:
                level: 4
                xp: 1280
                coins: 320
                streak: 6
              progress:
                lessonsDone: 12
                quizzesDone: 5
      responses:
        "201":
          description: Row created or updated.
        "200":
          description: Row updated.

  # ---------------------------------------------------------------------------
  # Supabase Auth (GoTrue)
  # ---------------------------------------------------------------------------
  /auth/v1/signup:
    post:
      tags: [Auth]
      summary: Sign up with email and password
      description: >
        Creates a new account. `options.data.display_name` is stored in user
        metadata. If email confirmation is enabled, no session is returned until
        the user confirms.
      operationId: signUp
      servers:
        - url: "{supabaseUrl}"
          variables:
            supabaseUrl:
              default: https://YOUR-PROJECT.supabase.co
      security:
        - SupabaseApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
      responses:
        "200":
          description: User (and possibly a session) created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "400":
          description: Invalid sign-up (e.g. weak password, duplicate email).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoTrueError"

  /auth/v1/token:
    post:
      tags: [Auth]
      summary: Sign in (password grant)
      description: Exchanges email and password for an access/refresh token pair.
      operationId: signInWithPassword
      servers:
        - url: "{supabaseUrl}"
          variables:
            supabaseUrl:
              default: https://YOUR-PROJECT.supabase.co
      security:
        - SupabaseApiKey: []
      parameters:
        - name: grant_type
          in: query
          required: true
          schema:
            type: string
            enum: [password, refresh_token]
            default: password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordGrantRequest"
      responses:
        "200":
          description: Authenticated session.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "400":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoTrueError"

  /auth/v1/authorize:
    get:
      tags: [Auth]
      summary: Start Google OAuth
      description: >
        Redirect endpoint for OAuth sign-in. The client calls
        `signInWithOAuth({ provider: 'google', options: { redirectTo } })`, which
        navigates the browser here and then back to `redirectTo` with a session.
      operationId: signInWithGoogle
      servers:
        - url: "{supabaseUrl}"
          variables:
            supabaseUrl:
              default: https://YOUR-PROJECT.supabase.co
      parameters:
        - name: provider
          in: query
          required: true
          schema:
            type: string
            example: google
        - name: redirect_to
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        "302":
          description: Redirect to the identity provider.

  /auth/v1/logout:
    post:
      tags: [Auth]
      summary: Sign out
      description: Revokes the current session's tokens.
      operationId: signOut
      servers:
        - url: "{supabaseUrl}"
          variables:
            supabaseUrl:
              default: https://YOUR-PROJECT.supabase.co
      security:
        - SupabaseApiKey: []
          SupabaseBearer: []
      responses:
        "204":
          description: Signed out.

components:
  securitySchemes:
    SupabaseApiKey:
      type: apiKey
      in: header
      name: apikey
      description: The project's anon key (NEXT_PUBLIC_SUPABASE_ANON_KEY).
    SupabaseBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: The signed-in user's access token (or anon key when unauthenticated).

  schemas:
    # ----- Chatbot -----
    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
      additionalProperties: false

    ChatRequest:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          description: Recent conversation history (last 14 messages).
          items:
            $ref: "#/components/schemas/ChatMessage"
        model:
          type: string
          description: Model identifier.
          example: "Qwen/Qwen2.5-7B-Instruct:fastest"
      additionalProperties: false

    ChatResponse:
      type: object
      description: >
        The client reads `reply` first, then falls back to `message`.
      properties:
        reply:
          type: string
        message:
          type: string
      additionalProperties: true

    # ----- Summary -----
    SummaryRequest:
      type: object
      required: [transcript]
      properties:
        transcript:
          type: string
          description: Full text transcript of the practice call.
      additionalProperties: false

    SummaryResponse:
      type: object
      description: Structured coaching summary. All fields are best-effort.
      properties:
        xpEarned:
          type: integer
          example: 25
        topicsPracticed:
          type: string
          example: Greetings, introductions
        wordsUsed:
          type: string
          example: 안녕하세요, 반가워요, 이름
        strengths:
          type: string
        weaknesses:
          type: string
        recommendedNextSteps:
          type: string
        dailyQuests:
          type: string
        coachNote:
          type: string
          example: Great work.
        summaryParagraph:
          type: string
      additionalProperties: true

    # ----- Transcribe -----
    TranscribeRequest:
      type: object
      required: [audio]
      properties:
        audio:
          type: string
          format: binary
          description: WAV audio chunk (16 kHz mono PCM), filename `chunk.wav`.
        language:
          type: string
          description: Language hint.
          example: ko
      additionalProperties: false

    TranscribeResponse:
      type: object
      properties:
        text:
          type: string
          description: Recognized transcript for the chunk.
      additionalProperties: true

    # ----- Profiles -----
    Player:
      type: object
      description: Player game state (stored as JSON in the `player` column).
      properties:
        level: { type: integer }
        xp: { type: integer }
        totalXPEarned: { type: integer }
        coins: { type: integer }
        badges:
          type: array
          items: { type: string }
        streak: { type: integer }
        lastLoginDate:
          type: string
          nullable: true
        inventory:
          type: array
          items: { type: string }
        equipped:
          $ref: "#/components/schemas/EquippedCosmetics"
        profileUsesInitials: { type: boolean }
        initialsBgCustom: { type: string }
        shopInitialized: { type: boolean }
      additionalProperties: true

    EquippedCosmetics:
      type: object
      properties:
        hat: { type: string, nullable: true }
        bg: { type: string, nullable: true }
        avatar: { type: string, nullable: true }
        frame: { type: string, nullable: true }
        background: { type: string, nullable: true }
        flair: { type: string, nullable: true }
        pet: { type: string, nullable: true }
        title: { type: string, nullable: true }
        initialsBg: { type: string, nullable: true }

    Progress:
      type: object
      description: Learning progress (stored as JSON in the `progress` column).
      properties:
        lessonsDone: { type: integer }
        completedLessonIds:
          type: array
          items: { type: string }
        quizzesDone: { type: integer }
        battlesWon: { type: integer }
        adventureCap: { type: integer }
        recentWork:
          type: array
          items:
            type: object
            properties:
              title: { type: string }
              type: { type: string }
              ts: { type: integer }
        jamoStars:
          type: object
          additionalProperties: { type: integer }
      additionalProperties: true

    ProfileRow:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          nullable: true
        display_name:
          type: string
          nullable: true
        avatar_image:
          type: string
          nullable: true
        player:
          $ref: "#/components/schemas/Player"
        progress:
          $ref: "#/components/schemas/Progress"
        updated_at:
          type: string
          format: date-time
          nullable: true

    ProfileUpsert:
      type: object
      required: [id]
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
        avatar_image:
          type: string
          nullable: true
        player:
          $ref: "#/components/schemas/Player"
        progress:
          $ref: "#/components/schemas/Progress"

    # ----- Auth -----
    SignUpRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        options:
          type: object
          properties:
            data:
              type: object
              properties:
                display_name:
                  type: string

    PasswordGrantRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        user_metadata:
          type: object
          additionalProperties: true

    AuthSession:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
        user:
          $ref: "#/components/schemas/AuthUser"
      additionalProperties: true

    GoTrueError:
      type: object
      properties:
        error:
          type: string
        error_description:
          type: string
        msg:
          type: string
        message:
          type: string
      additionalProperties: true

    # ----- Generic -----
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      additionalProperties: true
